  <circle cx="116" cy="462" r="6" fill="url(#accent)"/>
  <text x="138" y="472" font-family="Martian Mono, monospace" font-size="26" fill="#e2e8f0">Compound AI: Enforced Runtime</text>

  <text x="80" y="560" font-family="Schibsted Grotesk, sans-serif" font-size="24" fill="#6b7a92">The public face of a private R&amp;D habit.</text>

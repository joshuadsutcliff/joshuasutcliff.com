    <circle cx="1100" cy="110" r="8"/>
    <circle cx="1060" cy="200" r="10"/>
    <circle cx="1000" cy="280" r="7"/>
  </g>

  <text x="80" y="150" font-family="Archivo, sans-serif" font-size="26" letter-spacing="4" fill="#a1afc4">JOSHUASUTCLIFF.COM</text>

  <text x="78" y="300" font-family="Archivo, sans-serif" font-weight="700" font-size="92" fill="#e2e8f0">Joshua Sutcliff</text>

  <text x="80" y="372" font-family="Schibsted Grotesk, sans-serif" font-size="34" fill="#a1afc4">Agentic systems &amp; a compounding AI operating practice.</text>


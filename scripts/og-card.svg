<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.78" cy="0.18" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.15" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#07090f"/>
  <rect width="1200" height="630" fill="url(#glowP)"/>
  <rect width="1200" height="630" fill="url(#glowC)"/>
  <rect x="8" y="8" width="1184" height="614" rx="22" fill="none" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>

  <!-- node-graph motif, top-right -->
  <g stroke="url(#accent)" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round">
    <line x1="980" y1="120" x2="1060" y2="200"/>
    <line x1="1060" y1="200" x2="1100" y2="110"/>
    <line x1="980" y1="120" x2="1100" y2="110"/>
    <line x1="1060" y1="200" x2="1000" y2="280"/>
  </g>
  <g fill="url(#accent)">
